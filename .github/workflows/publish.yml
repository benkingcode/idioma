name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Clean .npmrc so OIDC auth is used instead of a (missing) token.
      # setup-node's registry-url would write _authToken=${NODE_AUTH_TOKEN}
      # which breaks trusted publishers when no token secret exists.
      - name: Configure npm registry
        run: echo "registry=https://registry.npmjs.org/" > ~/.npmrc

      - name: Build packages
        run: pnpm build

      - name: Compile translations
        run: pnpm -r --if-present compile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          REACT_VERSION=$(node -p "require('./packages/react/package.json').version")

          if [ "$CORE_VERSION" != "$TAG_VERSION" ] || [ "$REACT_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch!"
            echo "  Tag:           $TAG_VERSION"
            echo "  @idioma/core:  $CORE_VERSION"
            echo "  @idioma/react: $REACT_VERSION"
            exit 1
          fi
          echo "All versions match: $TAG_VERSION"

      - name: Publish @idioma/core
        run: pnpm --filter @idioma/core publish --no-git-checks --provenance --access public

      - name: Publish @idioma/react
        run: pnpm --filter @idioma/react publish --no-git-checks --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
